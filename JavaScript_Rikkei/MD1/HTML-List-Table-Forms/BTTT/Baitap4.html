<!DOCTYPE html>
<html lang="vi">

    <title>HTML Rikkei</title>
</head>
<body>
    <table>
        <caption>Lịch làm việc chi tiết từ thứ 2 đến thứ 6</caption>

            <tr>
                <th >Sáng</th>

                <td rowspan="2">Khảo sát thực địa</td>
                <td>Làm việc tại văn phòng</td>
            </tr>
            <tr>
                <th>Chiều</th>

                <td>Lên kế hoạch</td>

            </tr>
        </tbody>

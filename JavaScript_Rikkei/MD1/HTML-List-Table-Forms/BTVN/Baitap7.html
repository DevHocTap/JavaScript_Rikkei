<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Rikkei</title>
</head>
<body>
    <p>BÁO CÁO TÀI CHÍNH NĂM</p>
    <table>
        <caption>Báo cáo doanh thu và lợi nhuận các quý trong năm</caption>
        <thead>
            <th>Chỉ tiêu</th>
            <th>Quý 1</th>
            <th>Quý 2</th>
            <th>Quý 3</th>
            <th>Quý 4</th>
        </thead>
        <tbody>
            <tr>
                <th>Doanh thu (Tỷ VNĐ)</th>
                <td align="center">500</td>
                <td align="center">650</td>
                <td align="center">700</td>
                <td align="center">850</td>
            </tr>
            <tr>
                <th>Lợi nhuận (Tỷ VNĐ)</th>
                <td align="center">120</td>
                <td align="center">180</td>
                <td align="center">210</td>
                <td align="center">250</td>
            </tr>
        </tbody>
    </table>

</body>
</html>

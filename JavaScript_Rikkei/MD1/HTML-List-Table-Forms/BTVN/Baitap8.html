<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Rikkei</title>
</head>
<body>
    <form action="">
        <p><strong>Đăng Ký Đặt Vé Sự Kiện Âm Nhạc</strong></p>
        <label for="name">Họ và tên:</label>
        <input type="text" id="name" name="name" placeholder="Nhập họ và tên...">
        <br><br>
        <label for="quantity">Số lượng vé:</label>
        <input type="number" id="quantity" name="quantity" min="1" value="1">
        <br><br>
        <label for="vip_code">Mã vé VIP (Đã cấp sẵn):</label>
        <input type="text" id="vip_code" name="vip_code" value="MUSIC-VIP-2026" readonly>
        <br><br>
        <label for="discount_code">Mã giảm giá nội bộ:</label>
        <input type="disabled" id="discount_code" name="discount_code" value="NOT-ELIGIBLE" disabled>
        <br><br>
        <button type="submit">Xác nhận đặt vé</button>
    </form>
</body>
</html>

<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thêm Sách Mới</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-light d-flex align-items-center min-vh-100">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="bg-white border rounded p-4 shadow-sm">
            <h3 class="text-center mb-4">Thêm Sách Mới</h3>
            <form>
              <div class="mb-3">
                <label for="bookName" class="form-label fw-bold"
                  >Tên sách</label
                >
                <input
                  type="text"
                  class="form-control form-control-lg"
                  id="bookName"
                  placeholder="Nhập tên sách..."
                />
              </div>
              <div class="mb-3">
                <label for="authorName" class="form-label fw-bold"
                  >Tác giả</label
                >
                <input
                  type="text"
                  class="form-control form-control-lg"
                  id="authorName"
                  placeholder="Nhập tên tác giả..."
                />
              </div>
              <div class="mb-4">
                <label for="category" class="form-label fw-bold"
                  >Thể loại</label
                >
                <select class="form-select form-select-lg" id="category">
                  <option selected disabled>Chọn thể loại...</option>
                  <option value="1">Khoa học viễn tưởng</option>
                  <option value="2">Văn học</option>
                  <option value="3">Kỹ năng sống</option>
                </select>
              </div>
              <button type="submit" class="btn btn-primary w-100 btn-lg">
                Thêm sách
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Semantic & Elements</title>
  </head>
  <body>
    <header>
      <h1 style="color: rgb(43, 143, 214); text-align: center">
        Blog Công Nghệ Của Tôi
      </h1>
      <img
        src="Avartar.webp"
        alt="Avatar"
        style="
          width: 200px;
          height: 200px;
          border-radius: 50%;
          border: 4px solid #007ead;
          object-fit: cover;
          display: block;
          margin: 0 auto;
        "
      />
    </header>
    <main>
      <p style="text-align: center">
        Xin chào mọi người, mình là <strong>Hoàng Kim Tiến</strong>. Chào mừng
        các bạn đến với không gian cá nhân của mình, nơi mình dùng để lưu trữ
        kiến thức và <em>thỏa mãn đam về lập trình giao diện Web</em> mỗi ngày.
      </p>
    </main>
  </body>
</html>

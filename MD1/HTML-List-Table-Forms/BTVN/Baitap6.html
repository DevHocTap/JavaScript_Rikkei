<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Rikkei</title>
</head>
<body>
    <form action="">
        <p>Hồ sơ thông tin cá nhân</p>
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            <label for="name">Tên: </label>
            <input type="text" id="name" placeholder="Nhập họ và tên...">
            <br> <br>
            <label for="birthdate">Ngày sinh: </label>
            <input type="date" id="birthdate">
        </fieldset>
        <br>
        <fieldset>
            <legend>Thông tin liên hệ</legend>
            <label for="email">Email: </label>
            <input type="email" id="email" placeholder="example@email.com">
            <br><br>
            <label for="phone">Số điện thoại: </label>
            <input type="tel" id="phone" placeholder="0912345678">
        </fieldset>
        <br>
        <p>Ghi chú bổ sung:</p>
        <textarea id="notes" rows="4" cols="50" placeholder="Nhập ghi chú tại đây..."></textarea>
        <br>
        <button type="submit">Lưu hồ sơ</button>
    </form>
</body>
</html>

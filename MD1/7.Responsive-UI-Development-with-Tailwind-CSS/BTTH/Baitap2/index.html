<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="flex items-center justify-center h-48 bg-gray-50">
      <button
        class="/* 1. Định dạng cơ bản */ px-8 py-3 bg-blue-100 text-blue-600 font-semibold rounded-full /* 2. Trạng thái tương tác (Hover) */ hover:bg-blue-200 hover:text-blue-700 /* 3. Hiệu ứng chuyển động (Transition) */ transition-all duration-300 ease-in-out /* 4. Thêm hiệu ứng nhấn (Active) cho sinh động */ active:scale-95"
      >
        Khám phá ngay
      </button>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <section class="bg-gray-50 py-16 px-6">
      <div class="max-w-6xl mx-auto">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-10">
          Dịch Vụ Đi Kèm
        </h2>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
          <div
            class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow"
          >
            <div
              class="w-10 h-10 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center mb-4 text-xl"
            >
              <i class="fas fa-hotel"></i> <span class="text-sm">🏠</span>
            </div>
            <h3 class="font-bold text-gray-800 mb-2">Khách Sạn</h3>
            <p class="text-gray-500 text-xs leading-relaxed">
              Hệ thống khách sạn chuẩn quốc tế cao cấp và tiện nghi.
            </p>
          </div>

          <div
            class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow"
          >
            <div
              class="w-10 h-10 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center mb-4 text-xl"
            >
              <span>✈️</span>
            </div>
            <h3 class="font-bold text-gray-800 mb-2">Vé Máy Bay</h3>
            <p class="text-gray-500 text-xs leading-relaxed">
              Đối tác từ các hãng hàng không hàng đầu thế giới.
            </p>
          </div>

          <div
            class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow"
          >
            <div
              class="w-10 h-10 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center mb-4 text-xl"
            >
              <span>🛡️</span>
            </div>
            <h3 class="font-bold text-gray-800 mb-2">Bảo Hiểm</h3>
            <p class="text-gray-500 text-xs leading-relaxed">
              Đảm bảo an toàn 100% trong mọi tình huống khẩn cấp.
            </p>
          </div>

          <div
            class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow"
          >
            <div
              class="w-10 h-10 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center mb-4 text-xl"
            >
              <span>👥</span>
            </div>
            <h3 class="font-bold text-gray-800 mb-2">Hướng Dẫn</h3>
            <p class="text-gray-500 text-xs leading-relaxed">
              Đội ngũ hướng dẫn viên người bản địa giàu kinh nghiệm.
            </p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>

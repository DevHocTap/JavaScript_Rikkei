<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <section class="max-w-5xl mx-auto p-6">
      <h2 class="text-2xl font-bold text-center mb-8">Về Chúng Tôi</h2>

      <div
        class="flex flex-col md:flex-row items-center gap-8 bg-white rounded-xl shadow-sm overflow-hidden"
      >
        <div class="w-full md:w-1/2">
          <img
            src="chuyendi.jpg"
            alt="Chuyến đi"
            class="w-full h-auto object-cover rounded-lg"
          />
        </div>

        <div class="w-full md:w-1/2 flex flex-col gap-4">
          <h3 class="text-xl font-bold text-blue-800">
            Sứ mệnh của Wanderlust
          </h3>
          <p class="text-gray-600 leading-relaxed">
            Chúng tôi tin rằng mỗi chuyến đi không chỉ là việc di chuyển từ nơi
            này đến nơi khác, mà là một hành trình khám phá bản thân và thế
            giới. Wanderlust được sinh ra với mục đích tạo ra những trải nghiệm
            du lịch đích thực nhất...
          </p>
        </div>
      </div>
    </section>
  </body>
</html>

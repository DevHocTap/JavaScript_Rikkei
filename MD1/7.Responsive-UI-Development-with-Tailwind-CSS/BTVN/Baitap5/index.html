<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <section class="p-8 bg-gray-50">
      <h2 class="text-2xl font-bold text-center mb-8">Các Tour Nổi Bật</h2>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-6xl mx-auto">
        <div
          class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition-shadow"
        >
          <img
            src="thailan.jpg"
            alt="Thái Lan"
            class="w-full h-48 object-cover"
          />
          <div class="p-4 text-center">
            <h3 class="font-bold text-lg">Thái Lan</h3>
            <p class="text-gray-500 text-sm">Xứ sở chùa vàng</p>
          </div>
        </div>

        <div
          class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition-shadow"
        >
          <img
            src="nhatban.jpg"
            alt="Nhật Bản"
            class="w-full h-48 object-cover"
          />
          <div class="p-4 text-center">
            <h3 class="font-bold text-lg">Nhật Bản</h3>
            <p class="text-gray-500 text-sm">Hoa anh đào rực rỡ</p>
          </div>
        </div>

        <div
          class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition-shadow"
        >
          <img src="phap.jpg" alt="Pháp" class="w-full h-48 object-cover" />
          <div class="p-4 text-center">
            <h3 class="font-bold text-lg">Pháp</h3>
            <p class="text-gray-500 text-sm">Kinh đô ánh sáng</p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>

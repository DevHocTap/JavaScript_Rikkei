<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="bg-gray-100 p-10 flex justify-center">
      <div class="bg-white p-6 rounded-lg shadow-lg w-full max-w-4xl">
        <form class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
          <div class="flex flex-col gap-2">
            <label class="font-bold text-gray-700 text-sm">Điểm đến</label>
            <input
              type="text"
              placeholder="Bạn muốn đi đâu?"
              class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <div class="flex flex-col gap-2">
            <label class="font-bold text-gray-700 text-sm">Ngày đi</label>
            <input
              type="date"
              class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-500"
            />
          </div>

          <button
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-md transition-colors"
          >
            Tìm kiếm
          </button>
        </form>
      </div>
    </div>
  </body>
</html>

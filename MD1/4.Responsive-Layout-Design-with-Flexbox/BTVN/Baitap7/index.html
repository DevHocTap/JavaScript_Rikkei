<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML-CSS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="pricing">
      <div class="pricing-container">
        <article class="card">
          <h3>Cơ bản</h3>
          <div class="price">Miễn phí</div>
          <ul>
            <li>1 Dự án</li>
            <li>100MB Lưu trữ</li>
            <li>Hỗ trợ Email</li>
          </ul>
          <button class="button">Bắt đầu ngay</button>
        </article>

        <article class="card featured">
          <h3>Chuyên nghiệp</h3>
          <div class="price">99.000đ/th</div>
          <ul>
            <li>Dự án Không Giới Hạn</li>
            <li>10GB Lưu trữ</li>
            <li>Hỗ trợ 24/7</li>
            <li>Domain Tuỳ chỉnh</li>
          </ul>
          <button class="button primary">Nâng Cấp</button>
        </article>

        <article class="card">
          <h3>Doanh nghiệp</h3>
          <div class="price">Liên hệ</div>
          <ul>
            <li>Gói tuỳ chọn đầy đủ</li>
            <li>Dung lượng cao nhất</li>
            <li>Tư vấn riêng biệt</li>
          </ul>
          <button class="button">Tìm hiểu thêm</button>
        </article>
      </div>
    </section>
  </body>
</html>

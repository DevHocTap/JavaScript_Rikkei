<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML-CSS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="menu-section">
      <h2 class="title">Thực đơn của chúng tôi</h2>
      <div class="menu-container">
        <div class="food-card">
          <img src="Salad.jpg" alt="Salad" />
          <h3>Salad rau củ tươi</h3>
          <p class="price">45.000 VNĐ</p>
        </div>

        <div class="food-card">
          <img src="comgaolut.jpg" alt="Cơm gạo lứt">
          <h3>Cơm gạo lứt bổ dưỡng</h3>
          <p class="price">75.000 VNĐ</p>
        </div>

        <div class="food-card">
          <img src="pizza.png" alt="Pizza">
          <h3>Pizza hải sản phô mai</h3>
          <p class="price">120.000 VNĐ</p>
        </div>

        <div class="food-card">
          <img src="hamburger.jpg" alt="Hamburger">
          <h3>Hamburger bò úc</h3>
          <p class="price">85.000 VNĐ</p>
        </div>

        <div class="food-card">
          <img src="suonnuong.jpg" alt="Sườn nướng">
          <h3>Sườn nướng BBQ</h3>
          <p class="price">150.000 VNĐ</p>
        </div>
      </div>
    </section>
  </body>
</html>

<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sự kiện Rikkei Academy</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <style>
      :root {
        --bs-primary: #a6192e;
        --bs-primary-rgb: 166, 25, 46;
      }

      .btn-primary {
        --bs-btn-bg: var(--bs-primary);
        --bs-btn-border-color: var(--bs-primary);
        --bs-btn-hover-bg: #8b1527;
        --bs-btn-hover-border-color: #8b1527;
      }
      .card-event {
        border-top: 4px solid var(--bs-primary);
      }
    </style>
  </head>
  <body class="bg-light d-flex align-items-center min-vh-100 py-4">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-10 col-xl-9">
          <div class="card card-event border-0 shadow-sm overflow-hidden">
            <div class="row g-0 align-items-stretch">
              <div class="col-md-5">
                <img
                  src="https://images.unsplash.com/photo-1540575467063-178a50c2df87?q=80&w=800&auto=format&fit=crop"
                  class="img-fluid w-100 h-100 object-fit-cover"
                  alt="Sự kiện Tech Talk"
                />
              </div>

              <div class="col-md-7">
                <div class="card-body p-4 p-md-5">
                  <h3 class="card-title text-primary fw-bold mb-3">
                    Tech Talk: Tương Lai Lập Trình AI
                  </h3>

                  <p class="card-text text-secondary mb-4">
                    Tham gia cùng Rikkei Academy để khám phá những xu hướng công
                    nghệ AI mới nhất và cách ứng dụng vào phát triển phần mềm
                    trong tương lai.
                  </p>

                  <div class="mb-4">
                    <p class="mb-2">
                      <strong class="text-dark">Thời gian:</strong> 09:00 -
                      12:00, 25/11/2026
                    </p>
                    <p class="mb-0">
                      <strong class="text-dark">Địa điểm:</strong> Cơ sở Rikkei
                      Academy HN
                    </p>
                  </div>

                  <div class="d-flex flex-wrap gap-2">
                    <button class="btn btn-primary px-4 py-2">
                      Đăng Ký Ngay
                    </button>
                    <button class="btn btn-outline-dark px-4 py-2">
                      Xem Chi Tiết
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
